    // ========== 导入导出 ==========
    async function exportData() {
      // 导出时需要将 IndexedDB 中的图片转为 dataUrl 嵌入 JSON
      const exportNodes = [];
      for (const n of currentData.nodes) {
        const nodeCopy = { ...n, images: [] };
        for (const img of n.images) {
          try {
            const blob = await idbGetImage(img.id);
            if (blob) {
              const dataUrl = await blobToDataUrl(blob);
              nodeCopy.images.push({ id: img.id, dataUrl: dataUrl, size: img.size, type: img.type });
            } else {
              nodeCopy.images.push({ id: img.id }); // 数据丢失时只保留 id
            }
          } catch (e) {
            nodeCopy.images.push({ id: img.id });
          }
        }
        exportNodes.push(nodeCopy);
      }
      const exportObj = {
        categories: currentData.categories,
        nodes: exportNodes,
        links: currentData.links
      };
      const dataStr = JSON.stringify(exportObj, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const now = new Date();
      const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}`;
      a.href = url;
      a.download = `知识图谱_${ts}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function validateImportData(data) {
      if (!data || typeof data !== 'object') return '文件格式错误：不是有效的JSON对象';
      if (!Array.isArray(data.categories)) return '缺少 categories 数组';
      if (!Array.isArray(data.nodes)) return '缺少 nodes 数组';
      if (!Array.isArray(data.links)) return '缺少 links 数组';
      for (let i = 0; i < data.categories.length; i++) {
        const c = data.categories[i];
        if (!c.id || !c.name) return `categories[${i}] 缺少 id 或 name 字段`;
      }
      for (let i = 0; i < data.nodes.length; i++) {
        const n = data.nodes[i];
        if (n.id === undefined || !n.name) return `nodes[${i}] 缺少 id 或 name 字段`;
      }
      for (let i = 0; i < data.links.length; i++) {
        const l = data.links[i];
        if (l.source === undefined || l.target === undefined || !l.type) return `links[${i}] 缺少 source、target 或 type 字段`;
      }
      return null;
    }

    let pendingImportData = null;

    function handleFileImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const data = JSON.parse(ev.target.result);
          const err = validateImportData(data);
          if (err) {
            alert('❌ ' + err);
            dom.importFileInput.value = '';
            return;
          }
          pendingImportData = data;
          showImportPreview(data);
        } catch (ex) {
          alert('❌ JSON 解析失败，请检查文件格式');
          dom.importFileInput.value = '';
        }
      };
      reader.readAsText(file);
      dom.importFileInput.value = '';
    }

    function showImportPreview(data) {
      dom.importFileName.textContent = '文件已加载';
      dom.importCatCount.textContent = data.categories.length + ' 个';
      dom.importNodeCount.textContent = data.nodes.length + ' 个';
      dom.importLinkCount.textContent = data.links.length + ' 条';

      // 预计算 idMap（模拟 mergeData 的节点映射逻辑）
      const existingIdMap = {};
      const existingNameMap = {};
      currentData.nodes.forEach(n => {
        existingIdMap[n.id] = n;
        existingNameMap[n.name] = n.id;
      });

      const idMap = {};
      let newNodes = 0, skippedNodes = 0, mappedNodes = 0;

      data.nodes.forEach(n => {
        if (existingIdMap[n.id]) {
          idMap[n.id] = n.id;        // 同ID → 跳过，保留现有
          skippedNodes++;
        } else if (existingNameMap[n.name] !== undefined) {
          idMap[n.id] = existingNameMap[n.name];  // 同名不同ID → 映射到现有节点
          mappedNodes++;
        } else {
          idMap[n.id] = n.id;        // 真正的新节点
          newNodes++;
        }
      });

      // 用映射后的 ID 判断连线是否为新增
      const existingLinkKeys = new Set(
        currentData.links.map(l => `${l.source}-${l.target}-${l.type}`)
      );

      let newLinks = 0;
      data.links.forEach(l => {
        const mappedSource = idMap[l.source] !== undefined ? idMap[l.source] : l.source;
        const mappedTarget = idMap[l.target] !== undefined ? idMap[l.target] : l.target;
        const key = `${mappedSource}-${mappedTarget}-${l.type}`;
        if (!existingLinkKeys.has(key)) newLinks++;
      });

      dom.importMergeText.innerHTML = `合并时将 <b>新增 ${newNodes} 个节点</b>、<b>跳过 ${skippedNodes} 个已有节点</b>、<b>重名映射 ${mappedNodes} 个节点</b>，新增 <b>${newLinks} 条连线</b>`;
      dom.importMergeInfo.style.display = 'block';

      dom.importPreviewModal.querySelector('.bg-white').classList.remove('scale-95');
      openModal(dom.importPreviewModal);
    }

    function confirmImport() {
      if (!pendingImportData) return;
      const mode = document.querySelector('input[name="importMode"]:checked').value;
      if (mode === 'replace') {
        replaceData(pendingImportData);
      } else {
        mergeData(pendingImportData);
      }
      closeImportModal();
      cleanupAfterImport();
      alert('✅ 数据导入成功！');
    }

    function closeImportModal() {
      dom.importPreviewModal.querySelector('.bg-white').classList.add('scale-95');
      setTimeout(() => closeModal(dom.importPreviewModal), 300);
      pendingImportData = null;
    }

    // 将导入数据中含 dataUrl 的图片存入 IndexedDB
    async function migrateImportedImages(nodes) {
      for (const node of nodes) {
        for (const img of node.images) {
          if (img.dataUrl && !img.size) {
            try {
              const blob = dataUrlToBlob(img.dataUrl);
              await idbSaveImage(img.id, blob);
              img.size = blob.size;
              img.type = blob.type;
              delete img.dataUrl;
            } catch (e) { console.warn('导入图片存储失败:', e); }
          }
        }
      }
    }

    async function replaceData(data) {
      data.nodes = data.nodes.map(n => ({
        id: n.id, name: n.name, category: n.category || 'other',
        importance: n.importance || 3, notes: n.notes || '',
        clickCount: n.clickCount !== undefined ? n.clickCount : 0,
        images: Array.isArray(n.images) ? n.images : []
      }));
      data.links = data.links.map(l => ({
        source: typeof l.source === 'object' ? l.source.id : l.source,
        target: typeof l.target === 'object' ? l.target.id : l.target,
        type: l.type
      }));
      // 迁移导入数据中的图片到 IndexedDB
      await migrateImportedImages(data.nodes);
      currentData = data;
      cleanInvalidLinks();
      saveLocal();
      selectedNode = null;
      closeNodePanel();
      closeSidebar();
      renderGraph();
      renderCategoryList();
      renderRecentList();
      updateEmptyState();
    }

    async function mergeData(data) {
      const importNodes = data.nodes.map(n => ({
        id: n.id, name: n.name, category: n.category || 'other',
        importance: n.importance || 3, notes: n.notes || '',
        clickCount: n.clickCount !== undefined ? n.clickCount : 0,
        images: Array.isArray(n.images) ? n.images : []
      }));
      const importLinks = data.links.map(l => ({
        source: typeof l.source === 'object' ? l.source.id : l.source,
        target: typeof l.target === 'object' ? l.target.id : l.target,
        type: l.type
      }));
      const importCategories = (data.categories || []).map(c => ({
        id: c.id, name: c.name, color: c.color || '#64748b'
      }));

      // ★ 关键修复：先规范化现有links，因为D3力模拟后source/target变成了对象引用
      currentData.links = currentData.links.map(l => ({
        source: typeof l.source === 'object' ? l.source.id : l.source,
        target: typeof l.target === 'object' ? l.target.id : l.target,
        type: l.type
      }));

      // 1. 合并分类
      const existingCatIds = new Set(currentData.categories.map(c => c.id));
      const existingCatNames = new Set(currentData.categories.map(c => c.name));
      importCategories.forEach(c => {
        if (!existingCatIds.has(c.id) && !existingCatNames.has(c.name)) {
          currentData.categories.push(c);
        }
      });

      // 2. 建立现有节点映射：名称 → 现有ID
      const nameToId = {};
      const usedIds = new Set();
      currentData.nodes.forEach(n => {
        nameToId[n.name] = n.id;
        usedIds.add(n.id);
      });
      const maxId = currentData.nodes.reduce((max, n) => Math.max(max, n.id), 0);
      let nextId = maxId + 1;

      // 3. ★ 纯名称匹配：同名→映射到现有节点，不同名→添加新节点
      const idMap = {};
      importNodes.forEach(impNode => {
        if (nameToId[impNode.name] !== undefined) {
          // 同名 → 映射到现有节点ID
          idMap[impNode.id] = nameToId[impNode.name];
        } else {
          // 新节点名 → 添加（ID冲突时自动分配新ID）
          let actualId = impNode.id;
          if (usedIds.has(actualId)) actualId = nextId++;
          currentData.nodes.push({ ...impNode, id: actualId });
          idMap[impNode.id] = actualId;
          nameToId[impNode.name] = actualId;
          usedIds.add(actualId);
        }
      });

      // 4. 合并连线
      const existingLinkKeys = new Set(
        currentData.links.map(l => `${l.source}-${l.target}-${l.type}`)
      );
      const allNodeIds = new Set(currentData.nodes.map(n => n.id));

      importLinks.forEach(impLink => {
        let s = idMap[impLink.source] !== undefined ? idMap[impLink.source] : impLink.source;
        let t = idMap[impLink.target] !== undefined ? idMap[impLink.target] : impLink.target;

        // 如果端点节点不在图中，从importNodes补加
        if (!allNodeIds.has(s)) {
          const orig = importNodes.find(n => n.id === impLink.source);
          if (!orig) return;
          let actualId = orig.id;
          if (usedIds.has(actualId)) actualId = nextId++;
          currentData.nodes.push({ ...orig, id: actualId });
          allNodeIds.add(actualId);
          usedIds.add(actualId);
          nameToId[orig.name] = actualId;
          idMap[impLink.source] = actualId;
          s = actualId;
        }
        if (!allNodeIds.has(t)) {
          const orig = importNodes.find(n => n.id === impLink.target);
          if (!orig) return;
          let actualId = orig.id;
          if (usedIds.has(actualId)) actualId = nextId++;
          currentData.nodes.push({ ...orig, id: actualId });
          allNodeIds.add(actualId);
          usedIds.add(actualId);
          nameToId[orig.name] = actualId;
          idMap[impLink.target] = actualId;
          t = actualId;
        }

        const key = `${s}-${t}-${impLink.type}`;
        if (existingLinkKeys.has(key)) return;

        currentData.links.push({ source: s, target: t, type: impLink.type });
        existingLinkKeys.add(key);
      });

      cleanInvalidLinks();
      // 迁移导入数据中的图片到 IndexedDB
      await migrateImportedImages(currentData.nodes);
      saveLocal();
      selectedNode = null;
      closeNodePanel();
      closeSidebar();
      renderGraph();
      renderCategoryList();
      renderRecentList();
      updateEmptyState();
    }

    function cleanupAfterImport() {
      pendingImportData = null;
    }

    // ========== 全局事件绑定 ==========
    function bindAllEvents() {
      // 侧边栏
      dom.menuBtn.onclick = openSidebar;
      dom.closeSidebar.onclick = closeSidebar;
      dom.overlay.onclick = closeSidebar;
      // 搜索（带防抖）
      dom.searchBtn.onclick = openSearch;
      dom.closeSearch.onclick = closeSearch;
      dom.searchInput.oninput = debounce(e => {
        const kw = e.target.value.toLowerCase();
        if (!kw) { node.selectAll("*").style("opacity", 1); link.style("opacity", 1); return; }
        const match = currentData.nodes.filter(n => n.name.toLowerCase().includes(kw));
        node.selectAll(".node").style("opacity", d => match.some(x => x.id === d.id) ? 1 : 0.2);
        link.style("opacity", d => {
          const sId = typeof d.source === 'object' ? d.source.id : d.source;
          const tId = typeof d.target === 'object' ? d.target.id : d.target;
          return match.some(x => x.id === sId) && match.some(x => x.id === tId) ? 1 : 0.1;
        });
      }, 300);
      // 添加节点
      dom.addNodeBtn.onclick = openAddNode;
      dom.cancelAdd.onclick = closeAddNode;
      dom.confirmAdd.onclick = addNode;
      // 节点详情
      dom.closeDetail.onclick = closeNodePanel;
      dom.saveNode.onclick = saveNodeInfo;
      dom.deleteNode.onclick = delNode;
      // 分类
      dom.addCategoryBtn.onclick = openAddCat;
      dom.cancelAddCategory.onclick = closeAddCat;
      dom.confirmAddCategory.onclick = addCategory;
      dom.cancelDeleteCategory.onclick = closeDelCat;
      dom.confirmDeleteCategory.onclick = delCategory;
      // 颜色选择
      dom.colorOptions.forEach(btn => {
        btn.onclick = () => {
          dom.colorOptions.forEach(b => b.classList.remove("border-primary"));
          btn.classList.add("border-primary");
          selectedColor = btn.dataset.color;
        };
      });
      // 星级评分
      dom.importanceStars.querySelectorAll("i").forEach((star, idx) => {
        star.onclick = () => {
          dom.importanceStars.querySelectorAll("i").forEach((s, i) => {
            s.className = i <= idx ? "fa fa-star text-2xl text-warning cursor-pointer" : "fa fa-star-o text-gray-300 cursor-pointer";
          });
        };
      });
      // 清空
      dom.clearAllBtn.onclick = openClear;
      dom.confirmClear.onclick = clearAll;
      dom.cancelClear.onclick = closeClear;
      // 图片上传
      dom.uploadImageBtn.onclick = () => dom.nodeImageInput.click();
      dom.nodeImageInput.onchange = handleImageUpload;
      // 图片预览
      dom.lightboxClose.onclick = closeLightbox;
      dom.lightboxPrev.onclick = lightboxPrevImage;
      dom.lightboxNext.onclick = lightboxNextImage;
      dom.imageLightbox.onclick = (e) => { if (e.target === dom.imageLightbox) closeLightbox(); };
      document.addEventListener('keydown', (e) => {
        if (!dom.imageLightbox.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') lightboxPrevImage();
        if (e.key === 'ArrowRight') lightboxNextImage();
      });
      // 导入导出
      dom.exportDataBtn.onclick = exportData;
      dom.importDataBtn.onclick = () => dom.importFileInput.click();
      dom.importFileInput.onchange = handleFileImport;
      dom.cancelImport.onclick = closeImportModal;
      dom.confirmImport.onclick = confirmImport;
      // 窗口缩放
      window.onresize = () => { if (simulation) simulation.stop(); renderGraph(); };
      // 富文本编辑器
      const richEditor = document.getElementById('richEditor');
      const richImageInput = document.getElementById('richImageInput');
      // 工具栏按钮点击事件
      document.querySelectorAll('.rich-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const cmd = btn.dataset.cmd;
          if (cmd === 'insertImage') {
            richImageInput.click();
          } else {
            document.execCommand(cmd, false, null);
            richEditor.focus();
          }
        });
      });
      // 富文本编辑器图片上传
      richImageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          const img = document.createElement('img');
          img.src = ev.target.result;
          img.style.maxWidth = '100%';
          img.style.height = 'auto';
          img.alt = '笔记图片';
          richEditor.appendChild(img);
          richImageInput.value = '';
        };
        reader.readAsDataURL(file);
      });
      // 禁止双击缩放
      document.addEventListener("dblclick", e => e.preventDefault(), { passive: false });
    }

    // ========== PWA 安装引导 ==========
    const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    const isAndroid = /android/.test(navigator.userAgent.toLowerCase());
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;

    // 拦截 Chrome 原生安装事件（需 HTTPS + manifest + SW 均已就绪才触发）
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!isStandalone) setTimeout(showPwaTip, 2000);
    });

    // 注册 appinstalled 事件（用户完成安装后清理提示）
    window.addEventListener('appinstalled', () => {
      const tip = document.getElementById('pwaTip');
      if (tip) tip.style.display = 'none';
      deferredPrompt = null;
    });

    function showPwaTip() {
      const tip = document.getElementById('pwaTip');
      if (!tip || isStandalone) return;
      if (deferredPrompt) {
        // Android Chrome 原生安装可用
        tip.innerHTML = `
          <p class="text-sm mb-2 font-medium">📲 将知识图谱安装到桌面</p>
          <p class="text-xs text-gray-300 mb-3">离线也能用，和原生 App 一样流畅</p>
          <button id="installPwaBtn" class="w-full bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium touch-target mb-2">一键安装到桌面</button>
          <button id="dismissPwaTip" class="w-full bg-white/20 text-white/80 px-4 py-2 rounded-lg text-xs touch-target">暂时不需要</button>
        `;
        tip.style.display = 'block';
        document.getElementById('installPwaBtn').onclick = () => {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(result => {
            deferredPrompt = null;
            if (result.outcome === 'accepted') tip.remove();
            else tip.style.display = 'none';
          });
        };
        document.getElementById('dismissPwaTip').onclick = () => { tip.style.display = 'none'; };
      } else if (isIOS) {
        // iOS Safari 手动引导
        tip.innerHTML = `
          <p class="text-sm mb-2 font-medium">💡 添加到主屏幕，下次一键打开</p>
          <p class="text-xs text-gray-300">点击底部 <i class="fa fa-share-square-o"></i> 分享 → 添加到主屏幕</p>
          <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-white/60 touch-target"><i class="fa fa-times"></i></button>
        `;
        tip.style.display = 'block';
      } else if (isAndroid) {
        // Android Chrome/Edge 但 HTTP 站点，显示手动安装引导
        const isHuawei = /HuaweiBrowser|HUAWEI|HarmonyOS/i.test(navigator.userAgent);
        if (isHuawei) {
          tip.innerHTML = `
            <p class="text-sm mb-2 font-medium">📲 将知识图谱添加到桌面</p>
            <p class="text-xs text-gray-300 mb-2">点击浏览器底部 <b>☰</b> 菜单</p>
            <p class="text-xs text-gray-300 mb-3">选择「添加到桌面」</p>
            <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-white/60 touch-target"><i class="fa fa-times"></i></button>
          `;
        } else {
          tip.innerHTML = `
            <p class="text-sm mb-2 font-medium">📲 添加到桌面，像 App 一样使用</p>
            <p class="text-xs text-gray-300 mb-2">1. 点击浏览器右上角 <b>⋮</b> 菜单</p>
            <p class="text-xs text-gray-300 mb-3">2. 选择「添加至主屏幕」</p>
            <button onclick="this.parentElement.remove()" class="w-full bg-white/20 text-white/80 px-4 py-2 rounded-lg text-xs touch-target">知道了</button>
          `;
        }
        tip.style.display = 'block';
      }
    }
    // 延迟显示（给 beforeinstallprompt 一点触发时间，HTTP 下无事件也显示引导）
    setTimeout(() => {
      if (!isStandalone) showPwaTip();
    }, 3500);

    // ========== Service Worker 注册（离线缓存） ==========
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('✅ SW 已注册，离线缓存就绪'))
          .catch(err => console.warn('⚠️ SW 注册失败:', err));
      });
    }

    // ========== 页面入口 ==========
    window.addEventListener("DOMContentLoaded", async () => {
      await initData();
      renderGraph();
      renderCategoryList();
      renderRecentList();
      bindAllEvents();
    });

    // ========== 页面卸载时清理 Object URL ==========
    window.addEventListener('beforeunload', () => {
      blobUrlCache.forEach((url, id) => {
        URL.revokeObjectURL(url);
      });
      blobUrlCache.clear();
    });
  </script>
</body>
</html>
