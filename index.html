<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>知识图谱</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="知识图谱">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3b82f6">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='52' font-family='sans-serif'>🧠</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#8b5cf6',
            success: '#10b981',
            warning: '#f59e0b',
            danger: '#ef4444',
            dark: '#1e293b'
          }
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto { content-visibility: auto; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
      .touch-target { min-height: 48px; min-width: 48px; }
    }
    .node-image-item {
      position: relative;
      border-radius: 0.75rem;
      overflow: hidden;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .node-image-item img {
      width: 100%;
      height: auto;
      max-height: 400px;
      object-fit: contain;
      display: block;
      cursor: zoom-in;
    }
    .node-image-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      background: #fff;
      border-top: 1px solid #f3f4f6;
    }
    /* 图片放大预览层 */
    #imageLightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #imageLightbox.active {
      display: flex;
    }
    #imageLightbox img {
      max-width: 92vw;
      max-height: 85vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 0.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    #lightboxClose {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      border: none;
      z-index: 101;
    }
    #lightboxClose:hover {
      background: rgba(255,255,255,0.3);
    }
    #lightboxNav {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 1rem;
      color: #fff;
      font-size: 0.875rem;
      background: rgba(0,0,0,0.4);
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }
    #lightboxNav button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #lightboxNav button:hover {
      background: rgba(255,255,255,0.3);
    }
    #lightboxNav button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    /* 小地图样式 */
    #minimap {
      transition: all 0.3s ease;
      overflow: hidden;
    }
    #minimap.collapsed {
      height: 32px !important;
    }
    #minimap.collapsed canvas {
      display: none;
    }
    #minimapViewport {
      position: absolute;
      border: 2px solid #3b82f6;
      background: rgba(59, 130, 246, 0.1);
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body class="bg-gray-50 text-dark overflow-hidden h-screen flex flex-col">
  <!-- 顶部导航 -->
  <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 py-3 flex items-center justify-between z-30 shadow-sm">
    <button id="menuBtn" class="touch-target text-gray-600 hover:text-primary">
      <i class="fa fa-bars text-xl"></i>
    </button>
    <div class="flex items-center space-x-2">
      <i class="fa fa-sitemap text-primary text-xl"></i>
      <h1 class="text-lg font-bold">知识图谱</h1>
    </div>
    <button id="searchBtn" class="touch-target text-gray-600 hover:text-primary">
      <i class="fa fa-search text-xl"></i>
    </button>
  </header>

  <!-- 移动端搜索栏 -->
  <div id="mobileSearch" class="absolute top-0 left-0 right-0 bg-white border-b border-gray-200 p-3 z-40 transform -translate-y-full transition-transform duration-300">
    <div class="flex items-center space-x-2">
      <button id="closeSearch" class="touch-target text-gray-600"><i class="fa fa-arrow-left"></i></button>
      <div class="relative flex-1">
        <input id="searchInput" placeholder="搜索知识节点..." class="w-full px-4 py-3 pl-10 rounded-lg border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
        <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
    </div>
  </div>

  <!-- 主内容区 -->
  <main class="flex flex-1 overflow-hidden relative">
    <!-- 左侧边栏 -->
    <aside id="sidebar" class="w-72 bg-white border-r border-gray-200 flex flex-col z-40 absolute top-0 left-0 h-full transform -translate-x-full transition-transform duration-300">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center">
        <h2 class="font-semibold text-lg">菜单</h2>
        <button id="closeSidebar" class="touch-target text-gray-400 hover:text-gray-600"><i class="fa fa-times"></i></button>
      </div>
      <div class="flex-1 overflow-y-auto scrollbar-hide">
        <div class="p-4 border-b border-gray-200">
          <button id="clearAllBtn" class="w-full flex items-center justify-center space-x-2 px-4 py-2 bg-danger text-white rounded-lg hover:bg-danger/90 transition-all">
            <i class="fa fa-trash"></i>
            <span>清空所有数据</span>
          </button>
        </div>
        <div class="p-4 border-b border-gray-200">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-semibold text-base">导入导出</h3>
          </div>
          <div class="space-y-2">
            <button id="exportDataBtn" class="w-full flex items-center justify-center space-x-2 px-4 py-2 bg-success text-white rounded-lg hover:bg-success/90 transition-all">
              <i class="fa fa-download"></i>
              <span>导出数据</span>
            </button>
            <button id="importDataBtn" class="w-full flex items-center justify-center space-x-2 px-4 py-2 bg-secondary text-white rounded-lg hover:bg-secondary/90 transition-all">
              <i class="fa fa-upload"></i>
              <span>导入数据</span>
            </button>
          </div>
        </div>
        <div class="p-4 border-b border-gray-200">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-semibold text-base">知识分类</h3>
            <button id="addCategoryBtn" class="touch-target text-primary hover:text-primary/80"><i class="fa fa-plus text-sm"></i></button>
          </div>
          <div id="categoriesList" class="space-y-2"></div>
        </div>
        <div class="p-4 border-b border-gray-200">
          <h3 class="font-semibold text-base mb-3">常见度说明</h3>
          <div class="space-y-2 text-sm">
            <div class="flex items-center space-x-2">
              <span class="w-4 h-4 rounded-full bg-white border-2 border-blue-200"></span>
              <span>很少点击 (0-2次)</span>
            </div>
            <div class="flex items-center space-x-2">
              <span class="w-4 h-4 rounded-full bg-white border-2 border-blue-400"></span>
              <span>一般点击 (3-5次)</span>
            </div>
            <div class="flex items-center space-x-2">
              <span class="w-4 h-4 rounded-full bg-white border-2 border-blue-600"></span>
              <span>经常点击 (6-9次)</span>
            </div>
            <div class="flex items-center space-x-2">
              <span class="w-4 h-4 rounded-full bg-white border-2 border-blue-900"></span>
              <span>高频点击 (≥10次)</span>
            </div>
          </div>
        </div>
        <div class="p-4">
          <h3 class="font-semibold text-base mb-3">最近添加</h3>
          <div id="recentNodes" class="space-y-3"></div>
        </div>
      </div>
    </aside>

    <div id="overlay" class="absolute inset-0 bg-black/50 z-30 opacity-0 pointer-events-none transition-opacity duration-300"></div>

    <!-- 图谱区域 -->
    <div id="graphContainer" class="flex-1 relative bg-gray-50">
      <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center z-10 text-gray-400 hidden">
        <i class="fa fa-sitemap text-6xl mb-4 opacity-30"></i>
        <p class="text-lg mb-2">暂无知识节点</p>
        <p class="text-sm">点击下方"+"按钮开始添加你的第一个知识点</p>
      </div>
      <div class="absolute bottom-4 left-4 bg-white rounded-lg shadow-md p-3 z-10">
        <h3 class="font-semibold text-sm mb-2">关系类型</h3>
        <div class="space-y-2 text-xs">
          <div class="flex items-center space-x-2"><div class="w-6 h-0.5 bg-primary"></div><span>包含关系</span></div>
          <div class="flex items-center space-x-2"><div class="w-6 h-0.5 bg-secondary"></div><span>前置知识</span></div>
          <div class="flex items-center space-x-2"><div class="w-6 h-0.5 bg-success"></div><span>相关关系</span></div>
        </div>
      </div>
      <svg id="knowledgeGraph" class="w-full h-full"></svg>

      <!-- 小地图 -->
      <div id="minimap" class="absolute bottom-4 right-4 bg-white rounded-lg shadow-lg border border-gray-200 z-10" style="width:200px;height:150px;">
        <div class="flex items-center justify-between px-2 py-1 border-b border-gray-200 bg-gray-50 rounded-t-lg">
          <span class="text-xs font-medium text-gray-600">导航地图</span>
          <button id="minimapToggle" class="text-xs text-gray-400 hover:text-gray-600"><i class="fa fa-chevron-down"></i></button>
        </div>
        <canvas id="minimapCanvas" width="200" height="120" style="width:100%;height:120px;cursor:pointer;"></canvas>
        <div id="minimapViewport" class="absolute border-2 border-primary pointer-events:none;display:none;"></div>
      </div>
    </div>

    <!-- 节点详情 -->
    <aside id="nodeDetails" class="w-full bg-white flex flex-col transform translate-x-full transition-transform duration-300 z-40 absolute top-0 right-0 h-full">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center">
        <button id="closeDetail" class="touch-target text-gray-600 hover:text-gray-800"><i class="fa fa-arrow-left text-xl"></i></button>
        <h2 id="detailTitle" class="font-semibold text-lg truncate flex-1 text-center mx-4">节点详情</h2>
        <div class="w-12"></div>
      </div>
      <div class="flex-1 overflow-y-auto p-4 space-y-5 scrollbar-hide">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">知识名称</label>
          <input id="nodeName" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">分类</label>
          <select id="nodeCategory" class="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none"></select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">常见度 (点击次数)</label>
          <div id="nodeClickCount" class="px-4 py-3 bg-gray-50 rounded-lg text-gray-700">0 次</div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">重要程度</label>
          <div id="importanceStars" class="flex items-center space-x-2">
            <i class="fa fa-star text-2xl text-warning cursor-pointer"></i>
            <i class="fa fa-star text-2xl text-warning cursor-pointer"></i>
            <i class="fa fa-star text-2xl text-warning cursor-pointer"></i>
            <i class="fa fa-star-o text-2xl text-gray-300 cursor-pointer"></i>
            <i class="fa fa-star-o text-2xl text-gray-300 cursor-pointer"></i>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">学习笔记</label>
          <div class="border border-gray-300 rounded-lg overflow-hidden">
            <div class="flex items-center gap-1 p-2 border-b border-gray-200 bg-gray-50">
              <button type="button" class="rich-btn px-2 py-1 rounded hover:bg-gray-200" data-cmd="bold" title="粗体"><i class="fa fa-bold text-sm"></i></button>
              <button type="button" class="rich-btn px-2 py-1 rounded hover:bg-gray-200" data-cmd="italic" title="斜体"><i class="fa fa-italic text-sm"></i></button>
              <button type="button" class="rich-btn px-2 py-1 rounded hover:bg-gray-200" data-cmd="underline" title="下划线"><i class="fa fa-underline text-sm"></i></button>
              <span class="w-px h-4 bg-gray-300 mx-1"></span>
              <button type="button" class="rich-btn px-2 py-1 rounded hover:bg-gray-200" data-cmd="insertImage" title="插入图片"><i class="fa fa-image text-sm"></i></button>
            </div>
            <div id="richEditor" class="min-h-[120px] p-3 outline-none" contenteditable="true" style="max-height:300px;overflow-y:auto;"></div>
          </div>
          <input type="file" id="richImageInput" accept="image/*" style="display:none;">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">学习笔记图片</label>
          <input type="file" id="nodeImageInput" accept="image/*" multiple style="display:none;">
          <button id="uploadImageBtn" class="w-full flex items-center justify-center space-x-2 px-4 py-3 border border-dashed border-gray-300 rounded-lg text-gray-500 hover:border-primary hover:text-primary transition-all mb-3">
            <i class="fa fa-image"></i>
            <span>上传图片</span>
          </button>
          <div id="nodeImagesList" class="space-y-3"></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">关联知识</label>
          <div id="relatedNodes" class="space-y-2 mb-3"></div>
        </div>
      </div>
      <div class="p-4 border-t border-gray-200 flex justify-between space-x-3 safe-area-bottom">
        <button id="deleteNode" class="flex-1 px-4 py-3 text-danger border border-danger rounded-lg hover:bg-danger/5">删除节点</button>
        <button id="saveNode" class="flex-1 px-4 py-3 bg-primary text-white rounded-lg hover:bg-primary/90">保存更改</button>
      </div>
    </aside>
  </main>

  <!-- 底部导航 -->
  <nav class="bg-white border-t border-gray-200 flex justify-center items-center py-2 safe-area-bottom z-20 space-x-16">
    <button class="touch-target flex flex-col items-center justify-center text-primary">
      <i class="fa fa-sitemap text-xl mb-1"></i><span class="text-xs">图谱</span>
    </button>
    <button id="addNodeBtn" class="touch-target flex flex-col items-center justify-center text-gray-600 hover:text-primary">
      <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center -mt-6 shadow-lg">
        <i class="fa fa-plus text-white text-xl"></i>
      </div>
      <span class="text-xs mt-1">添加</span>
    </button>
  </nav>

  <!-- 添加节点弹窗 -->
  <div id="addNodeModal" class="fixed inset-0 bg-black/50 flex items-end justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white rounded-t-xl shadow-xl w-full max-w-lg transform translate-y-full transition-transform duration-300 max-h-[90vh] flex flex-col">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center">
        <h2 class="text-lg font-semibold">添加新知识</h2>
        <button id="cancelAdd" class="touch-target text-gray-400"><i class="fa fa-times"></i></button>
      </div>
      <div class="p-4 space-y-4 overflow-y-auto flex-1">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">知识名称 *</label>
          <input id="newNodeName" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none" placeholder="输入知识名称">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">分类</label>
          <select id="newNodeCategory" class="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none"></select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">关联知识</label>
          <select id="newNodeRelated" class="w-full px-4 py-3 border border-gray-300 outline-none">
            <option value="">选择关联知识（可选）</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">关系类型</label>
          <select id="newRelationType" class="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none">
            <option value="contains">包含关系</option>
            <option value="prerequisite">前置知识</option>
            <option value="related">相关关系</option>
          </select>
        </div>
      </div>
      <div class="p-4 border-t border-gray-200 safe-area-bottom">
        <button id="confirmAdd" class="w-full px-4 py-3 bg-primary text-white rounded-lg">添加知识</button>
      </div>
    </div>
  </div>

  <!-- 添加分类弹窗 -->
  <div id="addCategoryModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 transform scale-95 transition-transform duration-300">
      <div class="p-4 border-b border-gray-200 flex justify-between items">
        <h2 class="text-lg font-semibold">添加分类</h2>
        <button id="cancelAddCategory" class="touch-target text-gray-400"><i class="fa fa-times"></i></button>
      </div>
      <div class="p-4 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">分类名称</label>
          <input id="newCategoryName" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none" placeholder="输入分类名称">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">分类颜色</label>
          <div class="flex flex-wrap gap-3" id="colorOptions">
            <button class="colorOption w-8 h-8 rounded-full bg-blue-500 border-2 border-primary" data-color="#3b82f6"></button>
            <button class="colorOption w-8 h-8 rounded-full bg-green-500 border-2 border-transparent" data-color="#10b981"></button>
            <button class="colorOption w-8 h-8 rounded-full bg-purple-500 border-2 border-transparent" data-color="#8b5cf6"></button>
            <button class="colorOption w-8 h-8 rounded-full bg-red-500 border-2 border-transparent" data-color="#ef4444"></button>
            <button class="colorOption w-8 h-8 rounded-full bg-yellow-500 border-2 border-transparent" data-color="#f59e0b"></button>
            <button class="colorOption w-8 h-8 rounded-full bg-gray-500 border-2 border-transparent" data-color="#64748b"></button>
          </div>
        </div>
      </div>
      <div class="p-4 border-t border-gray-200">
        <button id="confirmAddCategory" class="w-full px-4 py-3 bg-primary text-white rounded-lg">添加分类</button>
      </div>
    </div>
  </div>

  <!-- 删除分类弹窗 -->
  <div id="deleteCategoryModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 transform scale-95 transition-transform duration-300">
      <div class="p-4 border-b border-gray-200"><h2 class="text-lg font-semibold">删除分类</h2></div>
      <div class="p-4">
        <p id="deleteCategoryMsg" class="text-base text-gray-700 mb-4">确定要删除该分类吗？</p>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">转移至</label>
          <select id="transferCategory" class="w-full px-4 py-3 border border-gray-300 rounded-lg outline-none"></select>
        </div>
      </div>
      <div class="p-4 border-t border-gray-200 flex space-x-3">
        <button id="cancelDeleteCategory" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg">取消</button>
        <button id="confirmDeleteCategory" class="flex-1 px-4 py-3 bg-danger text-white rounded-lg">删除</button>
      </div>
    </div>
  </div>

  <!-- 清空确认弹窗 -->
  <div id="clearConfirmModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 transform scale-95 transition-transform duration-300">
      <div class="p-4 border-b border-gray-200">
        <h2 class="text-lg font-semibold text-danger">⚠️ 确认清空所有数据</h2>
      </div>
      <div class="p-4">
        <p class="text-base text-gray-700 mb-4">此操作永久删除所有节点、连线，无法恢复！</p>
        <p class="text-sm text-gray-500 mb-4">清空后保留默认分类</p>
        <div class="space-y-2">
          <button id="confirmClear" class="w-full px-4 py-3 bg-danger text-white rounded-lg">确认清空</button>

  <script>
    // 基础数据

    // 全局变量
    let currentData = {};

    let lightboxNode = null;

    let zoom; // 缩放行为
    let currentTransform = d3.zoomIdentity; // 当前缩放状态

    // ========== IndexedDB 图片存储 ==========
    const IDB_NAME = 'knowledgeGraphImages';
    const IDB_VERSION = 1;
    let idbDB = null;

    function openIDB() {
      return new Promise((resolve, reject) => {
        if (idbDB) { resolve(idbDB); return; }
        const req = indexedDB.open(IDB_NAME, IDB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('blobs')) {
            db.createObjectStore('blobs', { keyPath: 'id' });
          }
        };
        req.onsuccess = (e) => { idbDB = e.target.result; resolve(idbDB); };
        req.onerror = (e) => reject(e);
      });
    }

    function idbSaveImage(id, blob) {
      return openIDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction('blobs', 'readwrite');
          tx.objectStore('blobs').put({ id, blob });
          tx.oncomplete = () => resolve();
          tx.onerror = (e) => reject(e);
        });
      });
    }

    function idbGetImage(id) {
      return openIDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction('blobs', 'readonly');
          const req = tx.objectStore('blobs').get(id);
          req.onsuccess = () => resolve(req.result ? req.result.blob : null);
          req.onerror = (e) => reject(e);
        });
      });
    }

    function idbDeleteImage(id) {
      return openIDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction('blobs', 'readwrite');
          tx.objectStore('blobs').delete(id);
          tx.oncomplete = () => resolve();
          tx.onerror = (e) => reject(e);
        });
      });
    }

    function idbClearAll() {
      return openIDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction('blobs', 'readwrite');
          tx.objectStore('blobs').clear();
          tx.oncomplete = () => resolve();
          tx.onerror = (e) => reject(e);
        });
      });
    }

    function idbGetAllIds() {
      return openIDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction('blobs', 'readonly');
          const req = tx.objectStore('blobs').getAllKeys();
          req.onsuccess = () => resolve(req.result);
          req.onerror = (e) => reject(e);
        });
      });
    }

    // 将 Blob 转为 Object URL（用于显示），注意要及时 revoke
    const blobUrlCache = new Map();
    function getBlobUrl(id, blob) {
      if (blobUrlCache.has(id)) {
        URL.revokeObjectURL(blobUrlCache.get(id));
      }
      const url = URL.createObjectURL(blob);
      blobUrlCache.set(id, url);
      return url;
    }

    function revokeBlobUrl(id) {
      if (blobUrlCache.has(id)) {
        URL.revokeObjectURL(blobUrlCache.get(id));
        blobUrlCache.delete(id);
      }
    }

    // dataUrl 转 Blob
    function dataUrlToBlob(dataUrl) {
      const parts = dataUrl.split(',');
      const mime = parts[0].match(/:(.*?);/)[1];
      const bstr = atob(parts[1]);
      const u8arr = new Uint8Array(bstr.length);
      for (let i = 0; i < bstr.length; i++) u8arr[i] = bstr.charCodeAt(i);
      return new Blob([u8arr], { type: mime });
    }

    // Blob 转 dataUrl（导出用）
    function blobToDataUrl(blob) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(blob);
      });
    }

    // ========== XSS 防护 ==========
    function escapeHtml(str) {
      if (typeof str !== 'string') return str;
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== 防抖函数 ==========
    function debounce(fn, delay) {
      let timer = null;
      return function(...args) {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    // DOM快捷获取
    const $ = id => document.getElementById(id);
    const dom = {
      menuBtn: $('menuBtn'), sidebar: $('sidebar'), closeSidebar: $('closeSidebar'), overlay: $('overlay'),
      searchBtn: $('searchBtn'), mobileSearch: $('mobileSearch'), closeSearch: $('closeSearch'), searchInput: $('searchInput'),
      addNodeBtn: $('addNodeBtn'), addNodeModal: $('addNodeModal'), cancelAdd: $('cancelAdd'), confirmAdd: $('confirmAdd'),
      newNodeName: $('newNodeName'), newNodeCategory: $('newNodeCategory'), newNodeRelated: $('newNodeRelated'), newRelationType: $('newRelationType'),
      nodeDetails: $('nodeDetails'), closeDetail: $('closeDetail'), nodeName: $('nodeName'), nodeCategory: $('nodeCategory'),
      nodeClickCount: $('nodeClickCount'), nodeNotes: $('nodeNotes'), importanceStars: $('importanceStars'), relatedNodes: $('relatedNodes'),
      nodeImagesList: $('nodeImagesList'), uploadImageBtn: $('uploadImageBtn'), nodeImageInput: $('nodeImageInput'),
      imageLightbox: $('imageLightbox'), lightboxClose: $('lightboxClose'), lightboxImg: $('lightboxImg'),
      lightboxPrev: $('lightboxPrev'), lightboxNext: $('lightboxNext'), lightboxCounter: $('lightboxCounter'),
      saveNode: $('saveNode'), deleteNode: $('deleteNode'), categoriesList: $('categoriesList'), addCategoryBtn: $('addCategoryBtn'),
      addCategoryModal: $('addCategoryModal'), cancelAddCategory: $('cancelAddCategory'), confirmAddCategory: $('confirmAddCategory'),
      newCategoryName: $('newCategoryName'), colorOptions: document.querySelectorAll('.colorOption'),
      deleteCategoryModal: $('deleteCategoryModal'), deleteCategoryMsg: $('deleteCategoryMsg'), cancelDeleteCategory: $('cancelDeleteCategory'),
      confirmDeleteCategory: $('confirmDeleteCategory'), transferCategory: $('transferCategory'), recentNodes: $('recentNodes'),
      clearAllBtn: $('clearAllBtn'), clearConfirmModal: $('clearConfirmModal'), confirmClear: $('confirmClear'),
      cancelClear: $('cancelClear'), emptyState: $('emptyState'), knowledgeGraph: $('knowledgeGraph'), detailTitle: $('detailTitle'),
      // 导入导出
      exportDataBtn: $('exportDataBtn'), importDataBtn: $('importDataBtn'), importFileInput: $('importFileInput'),
      importPreviewModal: $('importPreviewModal'), importFileName: $('importFileName'), importCatCount: $('importCatCount'),
      importNodeCount: $('importNodeCount'), importLinkCount: $('importLinkCount'), cancelImport: $('cancelImport'),
      confirmImport: $('confirmImport'), importMergeInfo: $('importMergeInfo'), importMergeText: $('importMergeText')
    };

    // ========== 数据初始化 & 持久化 ==========
    async function initData() {
      try {
        // 先打开 IndexedDB
        await openIDB();
        const local = localStorage.getItem('knowledgeGraph');
        if (local) {
          currentData = JSON.parse(local);
          currentData.links = currentData.links.map(l => ({
            source: typeof l.source === 'object' ? l.source.id : l.source,
            target: typeof l.target === 'object' ? l.target.id : l.target,
            type: l.type
          }));
          currentData.nodes.forEach(n => {
            if (n.clickCount === undefined) n.clickCount = 0;
            delete n.status;
            if (!Array.isArray(n.images)) n.images = [];
          });
          // 迁移旧数据：如果 images 中有 dataUrl，转为 IndexedDB Blob
          let needMigration = false;
          for (const node of currentData.nodes) {
            for (const img of node.images) {
              if (img.dataUrl && !img.size) {
                needMigration = true;
                try {
                  const blob = dataUrlToBlob(img.dataUrl);
                  await idbSaveImage(img.id, blob);
                  img.size = blob.size;
                  img.type = blob.type;
                  delete img.dataUrl;
                } catch (e) { console.warn('迁移图片失败:', e); }
              }
            }
          }
          if (needMigration) saveLocal();
        } else {
          currentData = JSON.parse(JSON.stringify(initialData));
        }
      } catch (e) {
        currentData = JSON.parse(JSON.stringify(initialData));
      }
      saveLocal();
      cleanInvalidLinks();
    }
    function saveLocal() {
      try {
        localStorage.setItem('knowledgeGraph', JSON.stringify(currentData));
      } catch (e) {
        alert('存储空间已满！请删除一些图片或节点后重试。\n提示：每张图片会占用较多存储空间，建议控制图片数量。');
      }
    }
    function getStorageUsage() {
      let total = 0;
      for (let key in localStorage) {
        if (localStorage.hasOwnProperty(key)) {
          total += localStorage[key].length * 2; // UTF-16
        }
      }
      const limit = 5 * 1024 * 1024; // 5MB
      return { used: total, limit: limit, percent: Math.round(total / limit * 100) };
    }
    function compressImage(file, maxWidth, quality) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) {
              h = Math.round(h * maxWidth / w);
              w = maxWidth;
            }
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            // 使用 toBlob() 替代 toDataURL()
            canvas.toBlob(blob => {
              if (blob) {
                resolve(blob);
              } else {
                // 降级：toBlob 失败时返回原文件
                resolve(file);
              }
            }, 'image/jpeg', quality);
          };
          img.onerror = () => resolve(file);
          img.src = ev.target.result;
        };
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(file);
      });
    }
    function cleanInvalidLinks() {
      // 标准化：D3 力导向模拟后 source/target 可能被变异为对象引用
      currentData.links = currentData.links.map(l => ({
        source: typeof l.source === 'object' ? l.source.id : l.source,
        target: typeof l.target === 'object' ? l.target.id : l.target,
        type: l.type
      }));
      const nodeIds = new Set(currentData.nodes.map(n => n.id));
      currentData.links = currentData.links.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));
      const linkMap = new Set();
      currentData.links = currentData.links.filter(l => {
        const key = `${l.source}-${l.target}-${l.type}`;
        if (linkMap.has(key)) return false;
        linkMap.add(key);
        return true;
      });
      saveLocal();
    }

    // ========== 样式工具 ==========
    function getNodeStroke(click) {
      if (click <= 2) return '#bfdbfe';
      if (click <= 5) return '#60a5fa';
      if (click <= 9) return '#2563eb';
      return '#1e3a8a';
    }
    function getCategoryColor(cid) {
      const c = currentData.categories.find(x => x.id === cid);
      return c ? c.color : '#94a3b8';
    }

    // ========== 图谱渲染 + 核心拖拽联动 ==========
    let graphInitialized = false;
    
    function renderGraph() {
      const hh = 60, nh = 60;
      const w = window.innerWidth;
      const h = window.innerHeight - hh - nh;
      
      if (!graphInitialized) {
        // 首次初始化：创建 SVG、缩放、分组、箭头标记、力模拟
        initGraph(w, h);
        graphInitialized = true;
      } else {
        // 增量更新：只更新数据和力模拟
        updateGraph(w, h);
      }
      
      updateEmptyState();
      // 更新小地图
      if (minimapInitialized) {
        updateMinimap();
      }
    }
    
    function initGraph(w, h) {
      svg = d3.select("#knowledgeGraph").attr("width", w).attr("height", h);
      
      // 缩放 + 平移
      zoom = d3.zoom()
        .scaleExtent([0.2, 3])
        .on("zoom", (event) => {
          currentTransform = event.transform;
          g.attr("transform", event.transform);
          updateMinimapViewport();
        });
      
      svg.call(zoom);
      
      g = svg.append("g");
      
      // 箭头标记（只创建一次）
      svg.append("defs").selectAll("marker")
        .data(["contains", "prerequisite", "related"])
        .enter().append("marker")
        .attr("id", d => `arrow_${d}`)
        .attr("viewBox", "0 -5 10 10")
        .attr("refX", 32).attr("refY", 0)
        .attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto")
        .append("path")
        .attr("d", "M0,-5L10,0L0,5")
        .attr("fill", d => ({ contains: "#3b82f6", prerequisite: "#8b5cf6", related: "#10b981" }[d]));
      
      // 力模拟
      linkForce = d3.forceLink(currentData.links)
        .id(d => d.id)
        .distance(130)
        .strength(1.0);
      
      simulation = d3.forceSimulation(currentData.nodes)
        .force("link", linkForce)
        .force("charge", d3.forceManyBody().strength(-120))
        .force("center", d3.forceCenter(w / 2, h / 2))
        .force("collision", d3.forceCollide().radius(48))
        .velocityDecay(0.45);
      
      // 绘制连线
      link = g.append("g").selectAll("line")
        .data(currentData.links)
        .enter().append("line")
        .attr("stroke", d => ({ contains: "#3b82f6", prerequisite: "#8b5cf6", related: "#10b981" }[d.type]))
        .attr("stroke-width", 2)
        .attr("marker-end", d => `url(#arrow_${d.type})`);
      
      // 绘制连线标签
      const typeShortMap = { contains: "包含", prerequisite: "前置", related: "相关" };
      g.append("g").selectAll("text")
        .data(currentData.links)
        .enter().append("text")
        .attr("font-size", "10px")
        .attr("font-weight", "600")
        .attr("fill", d => ({ contains: "#3b82f6", prerequisite: "#8b5cf6", related: "#10b981" }[d.type]))
        .attr("text-anchor", "middle")
        .attr("dy", "-4")
        .style("pointer-events", "none")
        .style("text-shadow", "0 1px 2px rgba(255,255,255,0.9), 0 -1px 2px rgba(255,255,255,0.9), 1px 0 2px rgba(255,255,255,0.9), -1px 0 2px rgba(255,255,255,0.9)")
        .text(d => typeShortMap[d.type] || d.type);
      
      // 绘制节点
      node = g.append("g").selectAll(".node")
        .data(currentData.nodes)
        .enter().append("g")
        .attr("class", "node");
      
      node.append("circle")
        .attr("r", d => 18 + d.importance * 2)
        .attr("fill", d => getCategoryColor(d.category))
        .attr("stroke", d => getNodeStroke(d.clickCount))
        .attr("stroke-width", 3)
        .attr("filter", "drop-shadow(0 2px 4px rgba(0,0,0.1))");
      
      node.append("text")
        .attr("dy", 35).attr("text-anchor", "middle")
        .attr("font-size", "11px").attr("fill", "#334155")
        .text(d => d.name.length > 6 ? d.name.slice(0, 6) + "..." : d.name);
      
      // 事件绑定（只在初始化时绑定一次）
      bindNodeEvents();
      
      // 帧渲染
      simulation.on("tick", ticked);
      
      // 初始化小地图
      initMinimap();
    }
    
    function updateGraph(w, h) {
      // 更新 SVG 尺寸
      svg.attr("width", w).attr("height", h);
      
      // 更新力模拟中心
      simulation.force("center", d3.forceCenter(w / 2, h / 2));
      
      // 更新力模拟数据
      simulation.nodes(currentData.nodes);
      simulation.force("link").links(currentData.links);
      
      // 更新连线
      const links = g.selectAll("line").data(currentData.links);
      links.exit().remove();
      const linksEnter = links.enter().append("line")
        .attr("stroke", d => ({ contains: "#3b82f6", prerequisite: "#8b5cf6", related: "#10b981" }[d.type]))
        .attr("stroke-width", 2)
        .attr("marker-end", d => `url(#arrow_${d.type})`);
      links.merge(linksEnter);
      
      // 更新连线标签
      const linkLabels = g.selectAll("text").filter(function(d) { return d && d.source && d.target; });
      linkLabels.data(currentData.links);
      
      // 更新节点
      const nodes = g.selectAll(".node").data(currentData.nodes);
      nodes.exit().remove();
      const nodesEnter = nodes.enter().append("g").attr("class", "node");
      nodesEnter.append("circle")
        .attr("r", d => 18 + d.importance * 2)
        .attr("fill", d => getCategoryColor(d.category))
        .attr("stroke", d => getNodeStroke(d.clickCount))
        .attr("stroke-width", 3)
        .attr("filter", "drop-shadow(0 2px 4px rgba(0,0,0.1))");
      nodesEnter.append("text")
        .attr("dy", 35).attr("text-anchor", "middle")
        .attr("font-size", "11px").attr("fill", "#334155")
        .text(d => d.name.length > 6 ? d.name.slice(0, 6) + "..." : d.name);
      
      // 合并 enter 和 update，更新现有节点的样式
      const allNodes = nodesEnter.merge(nodes);
      allNodes.select("circle")
        .attr("r", d => 18 + d.importance * 2)
        .attr("fill", d => getCategoryColor(d.category))
        .attr("stroke", d => getNodeStroke(d.clickCount));
      allNodes.select("text")
        .text(d => d.name.length > 6 ? d.name.slice(0, 6) + "..." : d.name);
      
      // 更新全局 node 引用
      node = allNodes;
      link = g.selectAll("line");
      
      // 重启力模拟
      simulation.alpha(0.3).restart();
    }
    
    function bindNodeEvents() {
      // 鼠标按下记录坐标
      node.on("mousedown", (e, d) => {
        dragStartX = e.clientX;
        dragStartY = e.clientY;
      });
      
      // 拖拽
      const dragBehavior = d3.drag()
        .on("start", dragStarted)
        .on("drag", dragged)
        .on("end", dragEnded);
      node.call(dragBehavior);
      
      // 点击
      node.on("click", (e, d) => {
        const dx = Math.abs(e.clientX - dragStartX);
        const dy = Math.abs(e.clientY - dragStartY);
        if (dx < CLICK_THRESHOLD && dy < CLICK_THRESHOLD) {
          openNodePanel(d);
        }
      });
    }
    
    function ticked() {
      // 更新连线
      g.selectAll("line")
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);
      
      // 更新连线标签（只选择文字标签，不包括节点文字）
      g.selectAll("text").filter(function(d) { 
        return d && d.source && d.source.x !== undefined; 
      })
        .attr("x", d => (d.source.x + d.target.x) / 2)
        .attr("y", d => (d.source.y + d.target.y) / 2);
      
      // 更新节点位置
      if (node) {
        node.attr("transform", d => `translate(${d.x},${d.y})`);
      }
      
      // 更新小地图
      if (minimapInitialized) {
        updateMinimap();
        updateMinimapViewport();
      }
    }

    // ========== 标准拖拽联动（核心修复：关联节点强制跟随） ==========
    function dragStarted(e, d) {
      if (!e.active) simulation.alpha(1).restart();
      d.fx = d.x;
      d.fy = d.y;
    }
    function dragged(e, d) {
      // 仅固定被拖拽节点，连线拉力自动带动关联节点
      d.fx = e.x;
      d.fy = e.y;
    }
    function dragEnded(e, d) {
      if (!e.active) simulation.alpha(0);
      d.fx = null;
      d.fy = null;
      // 松手后轻微布局回弹，保持美观
      simulation.alpha(0.2).restart();
    }

    // ========== 小地图功能 ==========
    let minimapInitialized = false;
    function initMinimap() {
      if (minimapInitialized) return;
      const canvas = document.getElementById('minimapCanvas');
      const ctx = canvas.getContext('2d');
      const toggleBtn = document.getElementById('minimapToggle');

      // 小地图点击事件：点击后跳转到对应位置
      canvas.addEventListener('click', (e) => {
        if (!simulation || !zoom) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const bounds = getGraphBounds();
        const width = bounds.maxX - bounds.minX;
        const height = bounds.maxY - bounds.minY;
        if (width <= 0 || height <= 0) return;
        
        // 计算点击位置对应的图谱坐标
        const targetX = bounds.minX + (x / canvas.width) * width;
        const targetY = bounds.minY + (y / canvas.height) * height;

        // 跳转到对应位置（使用当前缩放比例或默认比例）
        const svgEl = document.getElementById('knowledgeGraph');
        const w = svgEl.clientWidth;
        const h = svgEl.clientHeight;
        const currentScale = currentTransform ? currentTransform.k : 1;
        const newTransform = d3.zoomIdentity
          .translate(w/2 - targetX * currentScale, h/2 - targetY * currentScale)
          .scale(currentScale);
        svg.transition().duration(500).call(zoom.transform, newTransform);
      });

      // 小地图折叠/展开
      toggleBtn.addEventListener('click', () => {
        const minimap = document.getElementById('minimap');
        minimap.classList.toggle('collapsed');
        toggleBtn.querySelector('i').classList.toggle('fa-chevron-down');
        toggleBtn.querySelector('i').classList.toggle('fa-chevron-up');
      });

      minimapInitialized = true;
    }

    function getGraphBounds() {
      if (!currentData.nodes || currentData.nodes.length === 0) {
        const svgEl = document.getElementById('knowledgeGraph');
        const w = svgEl ? svgEl.clientWidth : 800;
        const h = svgEl ? svgEl.clientHeight : 600;
        return { minX: 0, minY: 0, maxX: w, maxY: h };
      }
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      currentData.nodes.forEach(n => {
        const x = n.x || 0;
        const y = n.y || 0;
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      });
      // 如果所有节点的坐标都是 0 或 undefined，返回默认边界
      if (minX === Infinity || maxX === -Infinity) {
        const svgEl = document.getElementById('knowledgeGraph');
        const w = svgEl ? svgEl.clientWidth : 800;
        const h = svgEl ? svgEl.clientHeight : 600;
        return { minX: 0, minY: 0, maxX: w, maxY: h };
      }
      // 添加边距
      const padding = 50;
      return {
        minX: minX - padding,
        minY: minY - padding,
        maxX: maxX + padding,
        maxY: maxY + padding
      };
    }

    function updateMinimap() {
      if (!minimapInitialized) initMinimap();
      const canvas = document.getElementById('minimapCanvas');
      const ctx = canvas.getContext('2d');
      const bounds = getGraphBounds();
      const width = bounds.maxX - bounds.minX;
      const height = bounds.maxY - bounds.minY;

      // 清空画布
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (currentData.nodes.length === 0) return;

      // 绘制连线
      ctx.strokeStyle = '#94a3b8';
      ctx.lineWidth = 1;
      currentData.links.forEach(l => {
        const s = typeof l.source === 'object' ? l.source : currentData.nodes.find(n => n.id === l.source);
        const t = typeof l.target === 'object' ? l.target : currentData.nodes.find(n => n.id === l.target);
        if (!s || !t) return;
        const x1 = (s.x - bounds.minX) / width * canvas.width;
        const y1 = (s.y - bounds.minY) / height * canvas.height;
        const x2 = (t.x - bounds.minX) / width * canvas.width;
        const y2 = (t.y - bounds.minY) / height * canvas.height;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      });

      // 绘制节点
      currentData.nodes.forEach(n => {
        const x = (n.x - bounds.minX) / width * canvas.width;
        const y = (n.y - bounds.minY) / height * canvas.height;
        ctx.fillStyle = getCategoryColor(n.category);
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function updateMinimapViewport() {
      if (!svg || !currentTransform) return;
      const viewport = document.getElementById('minimapViewport');
      const canvas = document.getElementById('minimapCanvas');
      const bounds = getGraphBounds();
      const width = bounds.maxX - bounds.minX;
      const height = bounds.maxY - bounds.minY;
      if (width <= 0 || height <= 0) return;

      // 计算当前视口在小地图中的位置
      const svgEl = document.getElementById('knowledgeGraph');
      const w = svgEl.clientWidth;
      const h = svgEl.clientHeight;

      // 视口左上角在图谱坐标中的位置
      const viewX = -currentTransform.x / currentTransform.k;
      const viewY = -currentTransform.y / currentTransform.k;
      const viewW = w / currentTransform.k;
      const viewH = h / currentTransform.k;

      // 转换为小地图坐标
      const scaleX = canvas.width / width;
      const scaleY = canvas.height / height;
      const minimapX = (viewX - bounds.minX) * scaleX;
      const minimapY = (viewY - bounds.minY) * scaleY;
      const minimapW = viewW * scaleX;
      const minimapH = viewH * scaleY;

      // 设置视口指示器（相对于小地图容器，需加上标题栏高度32px）
      viewport.style.display = 'block';
      const titleHeight = 32;
      const vx = Math.max(0, minimapX);
      const vy = Math.max(0, minimapY) + titleHeight;
      viewport.style.left = vx + 'px';
      viewport.style.top = vy + 'px';
      viewport.style.width = Math.min(canvas.width - vx, minimapW) + 'px';
      viewport.style.height = Math.min(canvas.height - minimapY, minimapH) + 'px';
      viewport.style.position = 'absolute';
      viewport.style.pointerEvents = 'none';
      viewport.style.border = '2px solid #3b82f6';
      viewport.style.background = 'rgba(59, 130, 246, 0.1)';
      viewport.style.zIndex = '1';
    }

    // ========== 节点聚焦功能 ==========
    function focusOnNode(d) {
      if (!simulation || !zoom) return;
      // 如果节点坐标还未计算（力模拟未完成），等待一段时间后重试
      if (d.x === undefined || d.y === undefined) {
        setTimeout(() => focusOnNode(d), 300);
        return;
      }
      const svgEl = document.getElementById('knowledgeGraph');
      const w = svgEl.clientWidth;
      const h = svgEl.clientHeight;
      const scale = 1.5; // 聚焦时的缩放比例
      const newTransform = d3.zoomIdentity
        .translate(w / 2 - d.x * scale, h / 2 - d.y * scale)
        .scale(scale);
      svg.transition().duration(500).call(zoom.transform, newTransform);
    }

    // ========== 节点详情面板 ==========
    function openNodePanel(d) {
      selectedNode = d;
      d.clickCount++;
      saveLocal();

      // 重置旧节点样式
      if (node) {
        node.select("circle")
          .attr("r", n => 18 + n.importance * 2)
          .attr("stroke", n => getNodeStroke(n.clickCount));
      }
      // 高亮当前节点
      node.filter(n => n.id === d.id)
        .select("circle")
        .attr("r", 22 + d.importance * 2)
        .attr("stroke", "#fbbf24");

      dom.detailTitle.textContent = d.name;
      dom.nodeName.value = d.name;
      dom.nodeCategory.value = d.category;
      dom.nodeClickCount.textContent = `${d.clickCount} 次`;
      // 加载富文本笔记
      const richEditor = document.getElementById('richEditor');
      if (richEditor) richEditor.innerHTML = d.notes || "";
      renderNodeImages(d);

      // 星级
      const stars = dom.importanceStars.querySelectorAll("i");
      stars.forEach((s, i) => {
        s.className = i < d.importance ? "fa fa-star text-2xl text-warning cursor-pointer" : "fa fa-star-o text-2xl text-gray-300 cursor-pointer";
      });
      renderRelatedList(d);
      dom.nodeDetails.classList.remove("translate-x-full");
      // 自动聚焦到当前节点
      setTimeout(() => focusOnNode(d), 100);
    }
    function closeNodePanel() {
      dom.nodeDetails.classList.add("translate-x-full");
      selectedNode = null;
    }
    function renderRelatedList(d) {
      const container = dom.relatedNodes;
      container.innerHTML = "";
      const links = currentData.links.filter(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return s === d.id || t === d.id;
      });
      const typeMap = { contains: "包含关系", prerequisite: "前置知识", related: "相关关系" };
      if (links.length === 0) {
        const emptyDiv = document.createElement("div");
        emptyDiv.className = "text-gray-400 text-center py-2";
        emptyDiv.textContent = "暂无关联知识";
        container.appendChild(emptyDiv);
      }
      links.forEach(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        const relateId = s === d.id ? t : s;
        const relateNode = currentData.nodes.find(n => n.id === relateId);
        if (!relateNode) return;
        const div = document.createElement("div");
        div.className = "flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100";
        div.innerHTML = `
          <div class="flex items-center gap-2 flex-1 min-w-0 cursor-pointer">
            <span class="w-2 h-2 rounded-full flex-shrink-0" style="background:${escapeHtml(getCategoryColor(relateNode.category))}"></span>
            <span>${escapeHtml(relateNode.name)}</span>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <span class="text-xs bg-gray-200 px-2 py-0.5 rounded">${typeMap[l.type]}</span>
            <button class="del-rel w-7 h-7 flex items-center justify-center text-gray-400 hover:text-danger rounded-full touch-target">
              <i class="fa fa-times"></i>
            </button>
          </div>
        `;
        div.querySelector(".cursor-pointer").onclick = () => openNodePanel(relateNode);
        div.querySelector(".del-rel").onclick = (e) => {
          e.stopPropagation();
          if (!confirm(`确定解除与「${relateNode.name}」的关联？`)) return;
          deleteRelation(d.id, relateId, l.type);
          renderRelatedList(d);
          renderGraph();
        };
        container.appendChild(div);
      });
      // 添加关联按钮
      const addBtn = document.createElement("button");
      addBtn.className = "w-full p-2 border border-dashed border-gray-300 rounded-lg text-gray-400 hover:border-primary hover:text-primary text-sm mt-2";
      addBtn.innerHTML = '<i class="fa fa-plus mr-1"></i>添加关联';
      addBtn.onclick = () => showAddRelationForm(d, container);
      container.appendChild(addBtn);
    }

    function deleteRelation(nodeId, relateId, type) {
      currentData.links = currentData.links.filter(l => {
        if (l.type !== type) return true;
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return !((s === nodeId && t === relateId) || (s === relateId && t === nodeId));
      });
      cleanInvalidLinks();
      saveLocal();
    }

    function showAddRelationForm(d, container) {
      const addBtn = container.querySelector("button");
      if (addBtn) addBtn.remove();
      const formRow = document.createElement("div");
      formRow.className = "bg-blue-50 border border-blue-200 rounded-lg p-3 space-y-3";
      formRow.innerHTML = `
        <div class="flex items-center gap-2">
          <label class="text-xs text-gray-600 w-16 flex-shrink-0">目标节点</label>
          <select class="rel-target flex-1 px-2 py-2 border border-gray-300 rounded text-sm outline-none"></select>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-xs text-gray-600 w-16 flex-shrink-0">关系类型</label>
          <select class="rel-type flex-1 px-2 py-2 border border-gray-300 rounded text-sm outline-none">
            <option value="contains">包含关系</option>
            <option value="prerequisite">前置知识</option>
            <option value="related">相关关系</option>
          </select>
        </div>
        <div class="flex justify-end gap-2">
          <button class="cancel-rel px-3 py-1.5 border border-gray-300 rounded text-sm">取消</button>
          <button class="confirm-rel px-3 py-1.5 bg-primary text-white rounded text-sm">确认</button>
        </div>
      `;
      container.appendChild(formRow);
      const targetSel = formRow.querySelector(".rel-target");
      const linkedIds = new Set();
      currentData.links.filter(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return s === d.id || t === d.id;
      }).forEach(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        linkedIds.add(s === d.id ? t : s);
      });
      const hasOptions = currentData.nodes.some(n => n.id !== d.id && !linkedIds.has(n.id));
      if (!hasOptions) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "没有可关联的节点";
        opt.disabled = true;
        targetSel.appendChild(opt);
      }
      currentData.nodes.forEach(n => {
        if (n.id === d.id || linkedIds.has(n.id)) return;
        const opt = document.createElement("option");
        opt.value = n.id;
        opt.textContent = n.name;
        targetSel.appendChild(opt);
      });
      formRow.querySelector(".cancel-rel").onclick = () => renderRelatedList(d);
      formRow.querySelector(".confirm-rel").onclick = () => {
        const targetId = +targetSel.value;
        const type = formRow.querySelector(".rel-type").value;
        if (!targetId) { alert("请选择目标节点"); return; }
        const exists = currentData.links.some(l => {
          const s = typeof l.source === 'object' ? l.source.id : l.source;
          const t = typeof l.target === 'object' ? l.target.id : l.target;
          return (s === d.id && t === targetId && l.type === type) || (s === targetId && t === d.id && l.type === type);
        });
        if (exists) { alert("该关联已存在"); return; }
        currentData.links.push({ source: d.id, target: targetId, type: type });
        cleanInvalidLinks();
        saveLocal();
        renderRelatedList(d);
        renderGraph();
      };
    }

    // ========== 图片管理 ==========
    async function renderNodeImages(node) {
      const container = dom.nodeImagesList;
      container.innerHTML = "";
      if (!node.images || node.images.length === 0) {
        container.innerHTML = '<div class="text-gray-400 text-center py-4 text-sm">暂无图片</div>';
        return;
      }
      for (let idx = 0; idx < node.images.length; idx++) {
        const img = node.images[idx];
        const div = document.createElement("div");
        div.className = "node-image-item";
        // 先显示占位
        div.innerHTML = `
          <div style="height:120px;display:flex;align-items:center;justify-content:center;color:#9ca3af;background:#f3f4f6;">
            <i class="fa fa-spinner fa-spin text-xl"></i>
          </div>
          <div class="node-image-actions">
            <div class="flex items-center gap-1">
              <button class="move-img-left w-8 h-8 flex items-center justify-center text-gray-500 hover:text-primary rounded-full ${idx === 0 ? 'opacity-30 cursor-not-allowed' : ''}" data-index="${idx}">
                <i class="fa fa-arrow-left text-xs"></i>
              </button>
              <span class="text-xs text-gray-400 px-1">${idx + 1}/${node.images.length}</span>
              <button class="move-img-right w-8 h-8 flex items-center justify-center text-gray-500 hover:text-primary rounded-full ${idx === node.images.length - 1 ? 'opacity-30 cursor-not-allowed' : ''}" data-index="${idx}">
                <i class="fa fa-arrow-right text-xs"></i>
              </button>
            </div>
            <span class="text-xs text-gray-300">${img.size ? (img.size / 1024).toFixed(0) + 'KB' : ''}</span>
            <button class="del-img w-8 h-8 flex items-center justify-center text-gray-400 hover:text-danger rounded-full" data-index="${idx}">
              <i class="fa fa-trash-o text-xs"></i>
            </button>
          </div>
        `;
        const leftBtn = div.querySelector(".move-img-left");
        const rightBtn = div.querySelector(".move-img-right");
        const delBtn = div.querySelector(".del-img");
        if (idx > 0) leftBtn.onclick = () => moveNodeImage(node, idx, -1);
        if (idx < node.images.length - 1) rightBtn.onclick = () => moveNodeImage(node, idx, 1);
        delBtn.onclick = () => deleteNodeImage(node, idx);
        container.appendChild(div);
        // 异步加载图片
        const imgEl = document.createElement("img");
        imgEl.alt = "笔记图片";
        imgEl.loading = "lazy";
        imgEl.style.cssText = "width:100%;height:auto;max-height:400px;object-fit:contain;display:block;cursor:zoom-in;";
        const placeholder = div.querySelector("div");
        try {
          const blob = await idbGetImage(img.id);
          if (blob) {
            imgEl.src = getBlobUrl(img.id, blob);
            imgEl.onclick = () => openLightbox(node, idx);
          } else {
            placeholder.innerHTML = '<span style="color:#ef4444;font-size:12px;">图片数据丢失</span>';
          }
        } catch (e) {
          placeholder.innerHTML = '<span style="color:#ef4444;font-size:12px;">加载失败</span>';
        }
        placeholder.replaceWith(imgEl);
      }
    }

    function handleImageUpload(e) {
      if (!selectedNode) return;
      const files = Array.from(e.target.files);
      if (!files.length) return;
      let processed = 0;
      let failed = 0;
      files.forEach(file => {
        if (!file.type.startsWith("image/")) {
          processed++;
          return;
        }
        compressImage(file, 1200, 0.7).then(blob => {
          if (!blob || !selectedNode) { failed++; processed++; return; }
          // Blob 直接存入 IndexedDB
          const imgId = Date.now() + Math.random().toString(36).slice(2);
          idbSaveImage(imgId, blob).then(() => {
            if (!selectedNode) { failed++; processed++; return; }
            if (!selectedNode.images) selectedNode.images = [];
            selectedNode.images.push({ id: imgId, size: blob.size, type: blob.type });
            processed++;
            if (processed === files.length) {
              renderNodeImages(selectedNode);
              saveLocal();
              dom.nodeImageInput.value = "";
              if (failed > 0) alert(failed + ' 张图片上传失败');
            }
          }).catch(() => {
            failed++;
            processed++;
            if (processed === files.length) {
              renderNodeImages(selectedNode);
              saveLocal();
              dom.nodeImageInput.value = "";
              if (failed > 0) alert(failed + ' 张图片上传失败');
            }
          });
        });
      });
    }

    async function deleteNodeImage(node, index) {
      if (!confirm("确定删除这张图片？")) return;
      const img = node.images[index];
      node.images.splice(index, 1);
      // 从 IndexedDB 删除 Blob
      if (img.id) { revokeBlobUrl(img.id); await idbDeleteImage(img.id); }
      renderNodeImages(node);
      saveLocal();
    }

    function moveNodeImage(node, index, direction) {
      const newIndex = index + direction;
      if (newIndex < 0 || newIndex >= node.images.length) return;
      const temp = node.images[index];
      node.images[index] = node.images[newIndex];
      node.images[newIndex] = temp;
      renderNodeImages(node);
